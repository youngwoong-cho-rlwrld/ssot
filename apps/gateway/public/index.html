<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SSOT</title>
  <script src="/portal-assets/theme/theme-init.js"></script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" type="image/png" />
  <link rel="stylesheet" href="/portal-assets/inter/index.css" />
  <link rel="stylesheet" href="/portal-assets/theme/tokens.css" />
  <link rel="stylesheet" href="/portal-assets/theme/base.css" />
  <link rel="stylesheet" href="/portal-assets/theme/header.css" />
  <style>
    /* Document-style scrolling page: override base.css's full-viewport shell. */
    html, body { height: auto; }
    body { overflow: visible; min-height: 100vh; display: flex; flex-direction: column; }
    /* Centered, constrained column mirroring train-eval's home (max-w-2xl). */
    main {
      width: 100%;
      max-width: 672px;
      margin: 0 auto;
      padding: 72px 24px 48px;
      flex: 1;
    }
    h1 {
      margin: 0;
      font-size: var(--ssot-text-xl);
      font-weight: var(--ssot-weight-semibold);
      letter-spacing: -0.02em;
    }
    /* App list: thin-ruled rows, no card chrome — matches the train-eval nav. */
    .apps {
      margin-top: 24px;
      border-top: 1px solid var(--ssot-border);
      border-bottom: 1px solid var(--ssot-border);
    }
    a.app-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      text-decoration: none;
      color: inherit;
      transition: color 120ms ease;
    }
    a.app-row + a.app-row {
      border-top: 1px solid var(--ssot-border);
    }
    a.app-row:hover { color: var(--ssot-accent); }
    .app-row .icon,
    .app-row .chev {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      transition: color 120ms ease;
    }
    .app-row .icon { color: var(--ssot-text-soft); }
    .app-row .chev { color: var(--ssot-text-faint); }
    a.app-row:hover .icon,
    a.app-row:hover .chev { color: var(--ssot-accent); }
    .app-row .icon svg,
    .app-row .chev svg { display: block; width: 16px; height: 16px; }
    .app-row .body { min-width: 0; flex: 1; }
    .app-row .title {
      font-size: var(--ssot-text-sm);
      font-weight: var(--ssot-weight-medium);
    }
    .app-row .desc {
      font-size: var(--ssot-text-sm);
      color: var(--ssot-text-soft);
    }
    footer {
      padding: 24px;
      text-align: center;
      font-size: var(--ssot-text-xs);
      color: var(--ssot-text-faint);
    }
  </style>
</head>
<body>
  <header class="ssot-header">
    <a class="ssot-brand" href="/">SSOT</a>
    <span class="ssot-header-spacer"></span>
    <ssot-theme-toggle></ssot-theme-toggle>
    <ssot-user settings-url="/settings" login-url="/auth/login"></ssot-user>
  </header>
  <main>
    <h1>SSOT</h1>
    <nav class="apps" id="apps"></nav>
  </main>
  <footer>SSOT portal</footer>
  <script type="module" src="/portal-assets/theme/runtime.js"></script>
  <script>
    const apps = __SSOT_APPS_JSON__;

    // Small inline icons in lucide's stroke grammar, keyed by app id so the
    // list stays icon-consistent with the train-eval nav without pulling in a
    // font/icon dependency. Unknown ids fall back to a generic grid glyph.
    const ICONS = {
      'train-eval':
        '<rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/>',
      'results-sheet':
        '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>',
      'urdf-viewer':
        '<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>',
      'session-viewer':
        '<path d="M14 9a2 2 0 0 1-2 2H6l-4 4V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2Z"/><path d="M18 9h2a2 2 0 0 1 2 2v11l-4-4h-6a2 2 0 0 1-2-2v-1"/>',
      'openclaw':
        '<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>',
      'model-diagram':
        '<rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/>',
    };
    const DEFAULT_ICON =
      '<rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>';
    const CHEVRON = '<path d="m9 18 6-6-6-6"/>';

    function svg(inner) {
      return (
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
        'stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ' +
        'aria-hidden="true">' + inner + '</svg>'
      );
    }

    const container = document.getElementById('apps');
    for (const app of apps) {
      const row = document.createElement('a');
      row.className = 'app-row';
      row.href = app.basePath + '/';

      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.innerHTML = svg(ICONS[app.id] || DEFAULT_ICON);

      const body = document.createElement('div');
      body.className = 'body';
      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = app.name;
      const desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = app.description;
      body.append(title, desc);

      const chev = document.createElement('span');
      chev.className = 'chev';
      chev.innerHTML = svg(CHEVRON);

      row.append(icon, body, chev);
      container.appendChild(row);
    }
  </script>
</body>
</html>
