# GAM Stage-1 finetune — DexJoCo bimanual (dual-arm) 5 tasks, 224px, single view.
# DELTA-ACTION variant (fixes the absolute-pose "hold-collapse").
#
# Targets are per-chunk OBSERVATION-anchored deltas: delta_k = a_{t+k}^abs - p44(t),
# where p44(t) is the current proprio pose expressed in the 44-D action frame
# (xyz/hand index-select; wxyz-quaternion -> rotvec). Anchored at each chunk's own
# first frame. See robot/data/dexjoco_lerobot.py (dexjoco_dual_proprio_to_p44) and
# the serving reconstruction contract in DEXJOCO_INTEGRATION.md.
#
# Deltas are normalized by their OWN q01/q99 under stats key
# "dexjoco_dual_arm_delta" (recompute or load from GAM_STATS_DIR). n_dims=44,
# proprio_dim=46. chunk_size=8. Velocity (chunk first-difference) loss ON.
# Everything else matches the collapsed run (gam_config.yaml @ commit 69afa53):
# 30k steps / batch 512 / lr 5e-5 / lambda_action 3.0 / action_input_rate 0.4 /
# H_choices unchanged / EMA 0.999 / freeze_before 13.

stage_1:
  ckpt_path: "${oc.env:DA3_ROOT,.}/checkpoints/track4world_da3.pth"
  encoder_input_size: 224
  normalization_stat_path: null

da3_finetune:
  enabled: true
  freeze_blocks_before: 13
  n_action_steps: 8          # = future_steps + 1 (include_current_action)
  n_views: 1                 # single front view
  use_temporal_embed: false
  action_input_rate: 0.4

action_head:
  type: "mlp_resnet"
  input_dim: 1536            # DA3-Giant per-view feature dim (pool_mode=mean -> view-count-independent)
  hidden_dim: 1536
  n_dims: 44
  chunk_size: 8
  chunk_position_encoding: "learned"
  num_blocks: 2
  pool_mode: "mean"

regularization:
  lambda_feat: 0.0
  layer_weight_min: 0.5
  adaptive_lambda: false
  lambda_depth: 0.0          # DexJoCo LeRobot carries no depth; feature-future loss stays on
  depth_grad_weight: 1.0
  depth_decode_chunk_size: 1
  lambda_camera: 0.0

proprioception:
  proprio_dim: 46

predictor:
  enabled: true
  type: "gam"
  d_model: 1024
  depth: 12
  num_heads: 16
  ffn_ratio: 4.0
  dropout: 0.0
  num_patches_per_view: 256
  use_language: true
  language_dim: 768
  language_len: 77
  clip_model: "openai/clip-vit-large-patch14"
  lambda_feat_future: 1.0
  lambda_sigreg: 0.0
  H_choices: [1, 2, 3, 4, 5, 6, 7]
  H_weights: [0.25, 0.20, 0.15, 0.12, 0.10, 0.09, 0.09]
  num_register_tokens: 0
  deep_gradient_checkpointing: true

training:
  # global_batch_size, grad_accum_steps, max_steps, ckpt_every are injected at
  # launch by dexjoco/train_dexjoco.sh from config.sh (TRAIN_GLOBAL_BATCH_SIZE,
  # TRAIN_NUM_GPUS, MAX_STEPS, SAVE_STEPS). config.sh is their single source of
  # truth — do not duplicate them here.
  micro_batch_size: 2
  base_lr: 5.0e-5
  head_lr_mult: 10.0
  predictor_lr_mult: 0.2
  adam_eps: 1.0e-6
  weight_decay: 0.0
  lambda_action: 3.0
  lambda_vel: 1.0            # velocity (chunk first-difference) L1; guards soft-collapse
  epochs: 500000
  clip_grad: 1.0
  warmup_steps: 500
  min_lr_ratio: 0.01
  log_every: 25
  vis_every: 999999
  eval_every: 999999
  global_seed: 42
  num_workers: 8
  bf16: true
  compile: false
  ema:
    enabled: true          # checkpoint-final.pt must carry EMA (rank-0 under DeepSpeed)
    decay: 0.999

dataset:
  type: "dexjoco_lerobot"
  data_root: "${oc.env:GAM_DATA_ROOT,.}"
  stats_dir: "${oc.env:GAM_STATS_DIR,${oc.env:GAM_DATA_ROOT,.}/_stats}"
  stats_key: "dexjoco_dual_arm_delta"   # delta-space normalizer key (distinct from absolute run)
  n_dims: 44
  proprio_dim: 46
  chunk_size: 8
  future_steps: 7
  include_current_action: true
  image_size: [224, 224]
  action_frame: "base_delta"            # observation-anchored per-chunk deltas
  n_views: 1
  train_crop_min_scale: 1.0   # full-frame; also read at serve time (crop parity)
  eval_crop_scale: 1.0
  eval_ratio: 0.05
  rollout_camera_keys: ["front"]    # eval server maps client "base" -> "front"
  datasets:
    - bimanual_assembly
    - bimanual_hanoi
    - bimanual_microwave_cook
    - bimanual_photograph
    - bimanual_unlock_ipad

use_dit: false
