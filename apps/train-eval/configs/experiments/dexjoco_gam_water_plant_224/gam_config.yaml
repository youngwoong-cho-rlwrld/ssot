# GAM Stage-1 fine-tune — DexJoCo water_plant, 224px, single front view.
# n_dims=22 ([xyz3, rotvec3, hand16]), proprio_dim=23. Raw joint-space actions
# (action_frame=base), depth off. Consumed by dexjoco/train_dexjoco.sh.

stage_1:
  ckpt_path: "${oc.env:DA3_ROOT,.}/checkpoints/track4world_da3.pth"
  encoder_input_size: 224
  normalization_stat_path: null

da3_finetune:
  enabled: true
  freeze_blocks_before: 13
  n_action_steps: 8
  n_views: 1
  use_temporal_embed: false
  action_input_rate: 0.4

action_head:
  type: "mlp_resnet"
  input_dim: 1536
  hidden_dim: 1536
  n_dims: 22
  chunk_size: 16
  chunk_position_encoding: "learned"
  num_blocks: 2
  pool_mode: "mean"

regularization:
  lambda_feat: 0.0
  layer_weight_min: 0.5
  adaptive_lambda: false
  lambda_depth: 0.0
  depth_grad_weight: 1.0
  depth_decode_chunk_size: 1
  lambda_camera: 0.0

proprioception:
  proprio_dim: 23

predictor:
  enabled: true
  type: "gam"
  d_model: 1024
  depth: 12
  num_heads: 16
  ffn_ratio: 4.0
  dropout: 0.0
  num_patches_per_view: 256
  use_language: true
  language_dim: 768
  language_len: 77
  clip_model: "openai/clip-vit-large-patch14"
  lambda_feat_future: 1.0
  lambda_sigreg: 0.0
  H_choices: [1, 2, 3, 4, 5, 6, 7]
  H_weights: [0.25, 0.20, 0.15, 0.12, 0.10, 0.09, 0.09]
  num_register_tokens: 0
  deep_gradient_checkpointing: true

training:
  # Global batch, GPU count, steps, and checkpoint cadence are injected from
  # config.sh by dexjoco/train_dexjoco.sh.
  micro_batch_size: 2
  base_lr: 5.0e-5
  head_lr_mult: 10.0
  predictor_lr_mult: 0.2
  adam_eps: 1.0e-6
  weight_decay: 0.0
  lambda_action: 3.0
  epochs: 500000
  clip_grad: 1.0
  warmup_steps: 500
  min_lr_ratio: 0.01
  log_every: 25
  vis_every: 999999
  eval_every: 999999
  global_seed: 42
  num_workers: 8
  bf16: true
  compile: false
  ema:
    enabled: true
    decay: 0.999

dataset:
  type: "dexjoco_lerobot"
  data_root: "${oc.env:GAM_DATA_ROOT,.}"
  stats_dir: "${oc.env:GAM_STATS_DIR,${oc.env:GAM_DATA_ROOT,.}/_stats}"
  # Keep single-task stats isolated from the pooled six-task single-arm run.
  stats_key: "water_plant"
  n_dims: 22
  proprio_dim: 23
  chunk_size: 16
  future_steps: 7
  include_current_action: true
  image_size: [224, 224]
  action_frame: "base"
  n_views: 1
  train_crop_min_scale: 1.0
  eval_crop_scale: 1.0
  eval_ratio: 0.05
  rollout_camera_keys: ["front"]
  datasets:
    - water_plant

use_dit: false
