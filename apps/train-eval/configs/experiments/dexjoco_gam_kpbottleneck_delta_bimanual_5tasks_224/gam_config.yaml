# GAM Stage-1 finetune — DexJoCo bimanual (dual-arm) 5 tasks, 224px, single view.
# REVISED KEYPOINT-BOTTLENECK variant that fixes the hold-collapse root cause on
# BOTH paths of the keypoint bottleneck at once:
#
#   1. ACTION path -> DELTA (inherited from the plain delta variant): action
#      targets are per-chunk observation-anchored deltas delta_k = a_{t+k}^abs -
#      p44(t) (action_frame=base_delta), normalized under stats key
#      dexjoco_dual_arm_delta. The keypoint head's decoder is supervised against
#      these delta targets (both the decoder-anchor term decode(GT_kp)->GT_delta
#      and the decoded-action term decode(pred_kp)->GT_delta), so neither admits
#      the absolute "hold current pose" optimum. Velocity loss ON.
#
#   2. KEYPOINT path -> RELATIVE (new): the 126-D keypoint TARGETS are made
#      observation-anchored relative motions rel_k = kp_{t+k} - kp_t (anchor =
#      the chunk's own first frame, mirroring _actions_to_delta), then normalized
#      by a keypoint-DELTA normalizer computed on that relative distribution
#      (KeypointNormalizer, {stats_key}_keypoint.json). Absolute camera-frame
#      keypoints (~0.5-1m from camera, cm/chunk motion) were DC-dominated and
#      re-collapsed exactly like absolute actions; relative keypoints are
#      motion-centric.
#
# DECODER CONTRACT / subtlety: the decoder is a global MLP relative_kp(126) ->
# delta_action(44) with NO anchor input (so serving is unchanged — the server
# only ever calls head.forward(tokens) -> 44-D delta chunk, stats_key ends in
# _delta -> reconstructs absolute via a_abs = delta + p44(state)). Strictly,
# delta_action = F(kp_t+rel) - F(kp_t) depends on the anchor pose kp_t, so the
# anchor-free decoder learns the AVERAGE motion Jacobian (an approximation, same
# structural choice as v1's absolute decoder). This does NOT affect the
# collapse fix — both keypoint and action targets are now motion-centric — only
# the decoder's reconstruction accuracy. decoder_anchor_weight is kept at
# full strength (1.0) so the decoder fits the well-posed GT-relative-kp -> delta
# average map firmly.
#
# n_dims=44 (r_xyz3,r_rotvec3,r_hand16, l_xyz3,l_rotvec3,l_hand16), proprio_dim=46.
# chunk_size=8 (paper C=8, matches the plain delta variant).

stage_1:
  ckpt_path: "${oc.env:DA3_ROOT,.}/checkpoints/track4world_da3.pth"
  encoder_input_size: 224
  normalization_stat_path: null

da3_finetune:
  enabled: true
  freeze_blocks_before: 13
  n_action_steps: 8          # = future_steps + 1 (include_current_action)
  n_views: 1                 # single front view
  use_temporal_embed: false
  action_input_rate: 0.4

action_head:
  type: "mlp_resnet"
  input_dim: 1536            # DA3-Giant per-view feature dim (pool_mode=mean -> view-count-independent)
  hidden_dim: 1536
  n_dims: 44
  chunk_size: 8
  chunk_position_encoding: "learned"
  num_blocks: 2
  pool_mode: "mean"
  keypoint_bottleneck:
    enabled: true
    keypoint_dim: 126
    decoder_hidden_dim: 1024
    decoder_layers: 2
    # Revised recipe: v2 co-adaptation (non-detached decoder + warmup-ramped
    # decoded-action term that REPLACES the global lambda_action so it never
    # re-inflates the action path) on top of the delta action space + relative
    # keypoints, with v1's full-strength decoder anchor (1.0) since the
    # anchor-free relative decoder needs the GT anchor to fit its average map.
    detach_decoder_for_action_loss: false
    keypoint_loss_type: "l1"
    keypoint_loss_weight: 1.0
    decoder_anchor_weight: 1.0
    lambda_decoded_action: 0.25
    decoded_action_warmup_steps: 1000

regularization:
  lambda_feat: 0.0
  layer_weight_min: 0.5
  adaptive_lambda: false
  lambda_depth: 0.0          # DexJoCo LeRobot carries no depth; feature-future loss stays on
  depth_grad_weight: 1.0
  depth_decode_chunk_size: 1
  lambda_camera: 0.0

proprioception:
  proprio_dim: 46

predictor:
  enabled: true
  type: "gam"
  d_model: 1024
  depth: 12
  num_heads: 16
  ffn_ratio: 4.0
  dropout: 0.0
  num_patches_per_view: 256
  use_language: true
  language_dim: 768
  language_len: 77
  clip_model: "openai/clip-vit-large-patch14"
  lambda_feat_future: 1.0
  lambda_sigreg: 0.0
  H_choices: [1, 2, 3, 4, 5, 6, 7]
  H_weights: [0.25, 0.20, 0.15, 0.12, 0.10, 0.09, 0.09]
  num_register_tokens: 0
  deep_gradient_checkpointing: true

training:
  # global_batch_size, grad_accum_steps, max_steps, ckpt_every are injected at
  # launch by dexjoco/train_dexjoco.sh from config.sh (TRAIN_GLOBAL_BATCH_SIZE,
  # TRAIN_NUM_GPUS, MAX_STEPS, SAVE_STEPS). config.sh is their single source of
  # truth — do not duplicate them here.
  micro_batch_size: 2
  base_lr: 5.0e-5
  head_lr_mult: 10.0
  predictor_lr_mult: 0.2
  adam_eps: 1.0e-6
  weight_decay: 0.0
  lambda_action: 3.0         # kept for logging; the keypoint bottleneck uses
                             # lambda_decoded_action (warmup) for the action path
  lambda_vel: 1.0            # velocity (chunk first-difference) L1 on decoded delta actions
  epochs: 500000
  clip_grad: 1.0
  warmup_steps: 500
  min_lr_ratio: 0.01
  log_every: 25
  vis_every: 999999
  eval_every: 999999
  global_seed: 42
  num_workers: 8
  bf16: true
  compile: false
  ema:
    enabled: true          # checkpoint-final.pt must carry EMA (rank-0 under DeepSpeed)
    decay: 0.999

dataset:
  type: "dexjoco_lerobot"
  data_root: "${oc.env:GAM_DATA_ROOT,.}"
  stats_dir: "${oc.env:GAM_STATS_DIR,${oc.env:GAM_DATA_ROOT,.}/_stats}"
  stats_key: "dexjoco_dual_arm_delta"   # delta-space normalizer key (shared by action + keypoint sidecars)
  n_dims: 44
  proprio_dim: 46
  chunk_size: 8
  future_steps: 7
  include_current_action: true
  image_size: [224, 224]
  action_frame: "base_delta"            # observation-anchored per-chunk deltas
  n_views: 1
  train_crop_min_scale: 1.0   # full-frame; also read at serve time (crop parity)
  eval_crop_scale: 1.0
  eval_ratio: 0.05
  rollout_camera_keys: ["front"]    # eval server maps client "base" -> "front"
  keypoint_targets:
    enabled: true
    column: "action.keypoint_pos_camera_front"
    keypoint_dim: 126
    relative: true                  # observation-anchored relative keypoints rel_k = kp_{t+k} - kp_t
  datasets:
    - bimanual_assembly_kp
    - bimanual_hanoi_kp
    - bimanual_microwave_cook_kp
    - bimanual_photograph_kp
    - bimanual_unlock_ipad_kp

use_dit: false
